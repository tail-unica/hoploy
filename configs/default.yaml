wrapper:
  pearlm:
    name: pearlm
    device: "cpu"
    hopwise_checkpoint_file: ""
    dataset: "default" 
    compile_mode: "default"
  kgglm:
    name: kgglm
    device: "cpu"
    hopwise_checkpoint_file: ""
    diversity_factor: 0.3
    propagate_connected_entities: false 
    compile_mode: "default"
    recommendation_count: 5

logits_processors:
  default:
    name: default_logits_processor
    repetition_penalty: 1.2
    no_repeat_ngram_size: 3

sequence_processor:
  default:
    name: default_cumulative_sequence_processor

plugin:
  autism:
    name: autism
    path: "plugins/autism"
    wrapper: [autism_model]
    logits_processors: [autism_logits_processor, autism_restricted_logits_processor]
    sequence_processor: [autism_sequence_processor]
    schema:
      module: autism_schema
      get:
        info: autism_model.info
      post:
        recommend: run 
        search: autism_model.search

logging:
  level: "DEBUG"
  format: "%(levelname_c)-9s %(message)s"