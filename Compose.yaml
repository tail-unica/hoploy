services:
  hopwise-serve:
    build:
      context: .
      dockerfile: DockerFile
    image: hopwise-serve:latest
    ports:
      - "8000:8000"
    volumes:
      # mount a local config override at runtime (optional)
      - ./configs:/app/configs:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
