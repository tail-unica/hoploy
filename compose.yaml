services:
  hoploy:
    build:
      context: .
      args:
        UID: "${HOST_UID:-1000}"
        GID: "${HOST_GID:-1000}"
    image: hoploy:latest
    ports:
      - "8102:8100"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONFAULTHANDLER=1
      - NVIDIA_VISIBLE_DEVICES=all
    restart: unless-stopped
    volumes:
      - ./datasets:/app/datasets
      - ./checkpoints:/app/checkpoints
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]

  # Hopwise training service.
  #
  # Usage with explicit arguments (overrides defaults):
  #   docker compose run train -c autism_test_hoploy --dataset autism
  #
  # Usage with environment variables (uses defaults from the command field):
  #   CHECKPOINT_CONFIG=autism_test_hoploy DATASET=autism docker compose up train
  #
  # Reads config from:  /app/checkpoints/<CHECKPOINT_CONFIG>/config.yaml
  # Reads dataset from: /app/datasets/<DATASET>/
  # Saves checkpoints to: /app/checkpoints/<CHECKPOINT_CONFIG>/
  train:
    image: hoploy:latest
    entrypoint: ["uv", "run", "python", "/app/train/train.py"]
    command:
      - "-c"
      - "${CHECKPOINT_CONFIG:-autism_test_hoploy}"
      - "--dataset"
      - "${DATASET:-autism}"
    environment:
      - PYTHONUNBUFFERED=1
    # Required by py-spy: allows root (inside container) to attach to any process
    # via 'docker exec -u root'. See scripts/pyspy.sh.
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./datasets:/app/datasets
      - ./checkpoints:/app/checkpoints
    restart: "no"
    profiles:
      - train
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["GPU-cac3bc3e-b1c3-a9e8-8317-f2d8ca3085dd"]
              capabilities: [gpu]