# ---------------------------------------------------------------------------
# Shared base for all hoploy serving services.
# Each service bind-mounts its own plugin, dataset and shared checkpoints:
#   /app/plugin      — the plugin directory (read-only)
#   /app/dataset     — the dataset directory (read-only)
#   /app/checkpoints — shared checkpoint store
# No environment variables needed: the framework always reads from these paths.
# ---------------------------------------------------------------------------
x-hoploy-base: &hoploy-base
  build:
    context: .
    args:
      UID: "${HOST_UID:-1000}"
      GID: "${HOST_GID:-1000}"
  image: hoploy:latest
  restart: unless-stopped
  environment:
    - PYTHONUNBUFFERED=1
    - PYTHONFAULTHANDLER=1
    - NVIDIA_VISIBLE_DEVICES=all
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 2
            capabilities: [gpu]
  volumes:
    - catalog:/app/catalog

x-train-base: &train-base
  image: hoploy:latest
  user: "root"
  command:
    - "-c"
    - "${CHECKPOINT_CONFIG:-movielens}"
    - "-d"
    - "${DATASET:-movielens}"
  environment:
    - PYTHONUNBUFFERED=1
  restart: "no"
  volumes:
    - /home/recsysdatasets:/app/datasets:ro
    - ./checkpoints:/app/checkpoints
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["${GPU_DEVICE_1}"]
            capabilities: [gpu]

services:
  # ---------------------------------------------------------------------------
  # Per-plugin serving services.
  # Start individually:  docker compose up hummus
  # Start together:      docker compose up hummus autism
  # ---------------------------------------------------------------------------
  hummus:
    <<: *hoploy-base
    ports:
      - "${HUMMUS_PORT:-8102}:8100"
    volumes:
      - ./plugins/hummus:/app/plugin:ro
      - ./datasets/hummus:/app/dataset:ro
      - ./checkpoints/hummus:/app/checkpoints:ro

  autism:
    <<: *hoploy-base
    ports:
      - "${AUTISM_PORT:-8103}:8100"
    volumes:
      - ./plugins/autism:/app/plugin:ro
      - ./datasets/autism:/app/dataset:ro
      - ./checkpoints/autism:/app/checkpoints:ro

  # ---------------------------------------------------------------------------
  # Hopwise training service.
  #
  # Usage:
  #   docker compose run --rm train -c <checkpoint_config> -d <dataset>
  #
  # Reads config from:  /app/checkpoints/<checkpoint_config>/config.yaml
  # Reads dataset from: /app/datasets/<dataset>/
  # Saves checkpoints to: /app/checkpoints/<checkpoint_config>/
  # ---------------------------------------------------------------------------
  train:
    <<: *train-base
    entrypoint: ["uv", "run", "python", "/app/train/train.py"]
    profiles:
      - train
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

  hyper:
    <<: *train-base
    entrypoint: ["uv", "run", "python", "/app/train/hyper.py"]
    profiles:
      - hyper

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  catalog:
    # Shared catalog cache: parquet files built from dataset TSVs.
    # Mounted read-write on all serving services; datasets remain read-only.
    driver: local